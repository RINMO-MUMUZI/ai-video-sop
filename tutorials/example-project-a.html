<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>示例项目A教程</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --panel: rgba(255, 255, 255, 0.96);
      --panel-2: #ffffff;
      --text: #1d2939;
      --muted: #667085;
      --line: #e9eef5;
      --green: #45c62f;
      --green-soft: rgba(69, 198, 47, 0.12);
      --green-deep: #173e4b;
      --green-mid: #1f7a63;
      --shadow: 0 20px 48px rgba(15, 23, 42, 0.07);
      --shadow-soft: 0 12px 30px rgba(15, 23, 42, 0.05);
      --radius: 20px;
      --content-width: 1020px;
      --toc-width: 250px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 181, 31, 0.08), transparent 24%),
        radial-gradient(circle at top right, rgba(70, 185, 255, 0.08), transparent 24%),
        linear-gradient(180deg, #f7f9fc 0%, #f2f5f9 100%);
      min-height: 100vh;
    }

    .page {
      display: grid;
      grid-template-columns: var(--toc-width) minmax(0, var(--content-width));
      gap: 24px;
      max-width: calc(var(--toc-width) + var(--content-width) + 80px);
      margin: 0 auto;
      padding: 28px 24px 52px;
    }

    .toc {
      position: sticky;
      top: 20px;
      align-self: start;
      max-height: calc(100vh - 40px);
      overflow: auto;
      padding: 18px 16px 14px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .toc h2 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .toc-list {
      display: grid;
      gap: 5px;
    }

    .toc a {
      display: block;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      line-height: 1.45;
      padding: 8px 10px;
      border-radius: 12px;
      transition: background-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .toc a.level-2 {
      color: var(--text);
      font-weight: 600;
      margin-top: 6px;
    }

    .toc a.level-3 {
      padding-left: 20px;
    }

    .toc a.level-4 {
      padding-left: 30px;
      font-size: 12px;
    }

    .toc a:hover,
    .toc a.active {
      color: var(--text);
      background: linear-gradient(90deg, rgba(69, 198, 47, 0.1), rgba(69, 198, 47, 0.03));
      transform: translateX(2px);
    }

    .main {
      min-width: 0;
    }

    .hero {
      background: #45c62f;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 18px;
      position: relative;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .hero::before {
      inset: auto -30px -48px auto;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.16);
    }

    .hero::after {
      top: 30px;
      right: 26%;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
    }

    .hero-body {
      position: relative;
      z-index: 1;
      padding: 38px 34px 30px;
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: 36px;
      line-height: 1.16;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.78;
      font-size: 15px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .overview-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      padding: 16px 16px 14px;
    }

    .overview-content {
      padding: 0;
    }

    .overview-card .eyebrow {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .overview-card strong {
      display: block;
      font-size: 18px;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.35;
    }

    .overview-card span {
      display: block;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.68;
    }

    .content {
      display: grid;
      gap: 18px;
    }

    .content h1:first-child {
      display: none;
    }

    .content h2,
    .content h3,
    .content h4 {
      scroll-margin-top: 16px;
    }

    .section-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
      padding: 28px 28px 22px;
      overflow: hidden;
      position: relative;
    }

    .section-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 8px;
      background: var(--card-accent, var(--green));
    }

    .section-card.section-2 { --card-accent: var(--green); }
    .section-card.section-1 { --card-accent: #5ec944; }
    .section-card.section-3 { --card-accent: #45c62f; }
    .section-card.section-4 { --card-accent: #45c62f; }

    .content h2 {
      margin: 6px 0 14px;
      padding: 0;
      font-size: 30px;
      line-height: 1.18;
      border-top: 0;
      color: var(--text);
    }

    .content h3 {
      margin: 24px 0 12px;
      font-size: 21px;
      line-height: 1.35;
      color: var(--text);
    }

    .content h4 {
      margin: 18px 0 10px;
      font-size: 16px;
      line-height: 1.45;
      color: #37517e;
    }

    .content p {
      margin: 10px 0 14px;
      color: #344054;
      line-height: 1.82;
      font-size: 15px;
    }

    .content a {
      color: #0f766e;
      text-decoration: none;
      border-bottom: 1px solid rgba(15, 118, 110, 0.28);
    }

    .content a:hover {
      color: #0b5f59;
      border-bottom-color: rgba(11, 95, 89, 0.42);
    }

    .content ul,
    .content ol {
      margin: 10px 0 16px;
      padding-left: 24px;
    }

    .content li {
      margin: 7px 0;
      line-height: 1.76;
      color: #344054;
    }

    .content hr {
      border: 0;
      height: 1px;
      background: #edf2f7;
      margin: 28px 0;
    }

    .content code {
      font-family: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
      font-size: 0.92em;
      color: #0f4c81;
      background: #f4f8fc;
      border: 1px solid #dbe7f3;
      border-radius: 8px;
      padding: 0.16em 0.4em;
    }

    .content pre {
      margin: 14px 0 18px;
      padding: 16px 18px;
      overflow: auto;
      background: #101828;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 16px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .content pre code {
      background: transparent;
      border: 0;
      padding: 0;
      color: #dbeafe;
      font-size: 13px;
      line-height: 1.68;
    }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0 18px;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid #e3eaf3;
      background: #fcfdff;
      display: block;
      overflow-x: auto;
    }

    .content thead {
      background: #f7f9fc;
    }

    .content th,
    .content td {
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      padding: 12px 14px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
      font-size: 14px;
      color: #344054;
    }

    .content tr:last-child td {
      border-bottom: 0;
    }

    .section-note {
      margin: 10px 0 16px;
      padding: 12px 14px;
      color: #52637d;
      border-left: 3px solid var(--card-accent, var(--orange));
      background: #f8fbff;
      border-radius: 0 12px 12px 0;
      font-size: 14px;
      line-height: 1.7;
    }

    .section-card .section-note {
      margin-top: 0;
    }

    .toc-divider {
      height: 1px;
      background: var(--line);
      margin: 12px 0;
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      text-align: center;
    }

    .feedback-fab {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 1200;
    }

    .feedback-trigger {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #45c62f, #2aa36d);
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: 0 18px 40px rgba(23, 62, 75, 0.24);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .feedback-trigger:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 44px rgba(23, 62, 75, 0.28);
    }

    .feedback-trigger:active {
      transform: translateY(0);
    }

    .feedback-overlay {
      position: fixed;
      inset: 0;
      z-index: 1190;
      background: rgba(15, 23, 42, 0.42);
      backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .feedback-panel {
      position: absolute;
      top: 24px;
      right: 24px;
      width: min(460px, calc(100vw - 24px));
      height: min(760px, calc(100vh - 48px));
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(233, 238, 245, 0.9);
      border-radius: 24px;
      box-shadow: 0 24px 56px rgba(15, 23, 42, 0.18);
      overflow: hidden;
      transform: translateY(16px) scale(0.98);
      transition: transform 0.22s ease;
    }

    .feedback-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .feedback-overlay.is-open .feedback-panel {
      transform: translateY(0) scale(1);
    }

    body.feedback-open {
      overflow: hidden;
    }

    .feedback-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .feedback-header h2 {
      margin: 0 0 6px;
      font-size: 18px;
      line-height: 1.35;
      color: var(--text);
    }

    .feedback-header p {
      margin: 0;
      font-size: 13px;
      line-height: 1.65;
      color: var(--muted);
    }

    .feedback-close {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 999px;
      background: #f5f7fb;
      color: var(--muted);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }

    .feedback-close:hover {
      background: #edf2f7;
      color: var(--text);
    }

    .feedback-body {
      flex: 1;
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
    }

    .feedback-note {
      margin: 0;
      font-size: 13px;
      line-height: 1.65;
      color: #52637d;
      background: #f8fbff;
      border: 1px solid #e3edf8;
      border-radius: 14px;
      padding: 12px 14px;
    }

    .feedback-frame-wrap {
      flex: 1;
      min-height: 360px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
      overflow: hidden;
    }

    .feedback-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    .feedback-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: left;
      padding: 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }

    .feedback-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .feedback-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid rgba(69, 198, 47, 0.18);
      background: rgba(69, 198, 47, 0.1);
      color: #1b6d2d;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .feedback-link:hover {
      background: rgba(69, 198, 47, 0.16);
    }

    .feedback-link.is-hidden {
      display: none;
    }

    @media (max-width: 1120px) {
      .page {
        grid-template-columns: 1fr;
        max-width: 960px;
      }

      .toc {
        position: relative;
        top: 0;
        max-height: none;
      }

      .overview-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px 12px 28px;
      }

      .hero-body,
      .toc {
        padding: 18px 16px;
      }

      .section-card {
        padding: 22px 18px 18px;
      }

      .hero h1 {
        font-size: 28px;
      }

      .content h2 {
        font-size: 22px;
      }

      .content h3 {
        font-size: 18px;
      }

      .overview-grid {
        grid-template-columns: 1fr;
      }

      .feedback-fab {
        right: 16px;
        bottom: 16px;
      }

      .feedback-panel {
        top: auto;
        right: 12px;
        bottom: 12px;
        left: 12px;
        width: auto;
        height: min(78vh, 720px);
      }

      .feedback-body {
        padding: 14px 16px 16px;
      }
    }

    @media print {
      body {
        background: #fff;
        color: #111827;
      }

      .page {
        display: block;
        max-width: none;
        padding: 0;
      }

      .toc {
        display: none;
      }

      .feedback-fab,
      .feedback-overlay {
        display: none;
      }

      .hero,
      .content,
      .section-card,
      .overview-card {
        box-shadow: none;
        border: 0;
        background: #fff;
        color: #111827;
      }

      .content p,
      .content li,
      .content th,
      .content td {
        color: #111827;
      }

      .content code,
      .content pre {
        color: #111827;
        background: #f8fafc;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="toc">
      <h2>目录导航</h2>
      <div class="toc-divider"></div>
      <nav id="toc-list" class="toc-list"></nav>
    </aside>

    <main class="main">

      <article id="content" class="content"></article>

      <div class="footer-note">
        页面会根据 Markdown 的章节结构自动生成导航和内容卡片，后续继续维护文档时不需要额外重排 HTML 结构。
      </div>
    </main>
  </div>

  <div class="feedback-fab">
    <button type="button" class="feedback-trigger" data-feedback-open aria-haspopup="dialog" aria-controls="feedback-overlay">
      文档反馈
    </button>
  </div>

  <div class="feedback-overlay" id="feedback-overlay" hidden>
    <section class="feedback-panel" role="dialog" aria-modal="true" aria-labelledby="feedback-title">
      <div class="feedback-header">
        <div>
          <h2 id="feedback-title">文档反馈</h2>
          <p>发现错别字、信息遗漏或表达不清时，欢迎直接提交，方便团队及时修正。</p>
        </div>
        <button type="button" class="feedback-close" data-feedback-close aria-label="关闭反馈面板">×</button>
      </div>
      <div class="feedback-body">
        <p class="feedback-note" id="feedback-note">提交前可尽量写清问题位置、原文内容和建议修改方式，方便快速处理。</p>
        <div class="feedback-frame-wrap" id="feedback-frame-wrap">
          <iframe class="feedback-frame" id="feedback-frame" title="文档反馈表单" loading="lazy" referrerpolicy="no-referrer"></iframe>
          <div class="feedback-empty" id="feedback-empty" hidden>
            当前还没有配置飞书反馈表单链接。<br />
            将页面脚本中的 <code>FEEDBACK_FORM_URL</code> 替换为真实表单地址后，这里会自动显示可提交的反馈入口。
          </div>
        </div>
        <div class="feedback-actions">
          <a class="feedback-link is-hidden" id="feedback-link" target="_blank" rel="noreferrer noopener">在新窗口打开反馈表单</a>
        </div>
      </div>
    </section>
  </div>

  <script id="md-source" type="text/plain"># 示例项目A教程

用于演示项目实际教程的推荐写法，后续新增项目时可直接复制本文件改写。

## 一、项目概况

- 项目类型：`剧情短片`
- 适用场景：`新人培训 / 项目复盘`
- 核心工具：`Lib TV`、`即梦`、`可灵 O3`
- 交付目标：完成可交付的竖屏短片，并沉淀可复用方法

## 二、项目目标

- 明确项目想解决的问题，而不是只罗列工具步骤
- 优先统一分镜逻辑、角色设定和场景风格
- 减少生视频阶段的连锁返工

## 三、制作拆解

### 1. 文字剧本 / 分镜定调
- 先确认叙事成立、镜头逻辑清晰
- 提前确定角色一致性、场景统一性和情绪基调
- 高风险镜头单独标记，避免后续集中返工

### 2. 生图阶段
- 先完成角色设定图和场景设定图
- 再按镜头拆分生成关键帧
- 生图完成后统一审核，不通过不进入生视频

### 3. 生视频阶段
- 先验证重点镜头，再推进批量生成
- 问题先判断属于分镜、生图还是生视频执行本身
- 镜头连贯性问题优先回到前置阶段修正

### 4. 配音 / 剪辑 / 导出
- 配音内容与分镜脚本保持一致
- 剪辑阶段重点做整合和交付完善，不承担前置方向返工
- 导出前统一检查版本、命名和归档完整性

## 四、关键问题复盘

### 1. 本项目最容易返工的点
- 镜头衔接
- 角色一致性
- 音画节奏不匹配

### 2. 本次如何规避
- 把审核前移到分镜和生图阶段
- 生图完成后先做统一审核，再进入生视频
- 剪辑阶段只处理交付层问题，不兜底前序方向问题

## 五、最终交付

- 分镜脚本
- 原画关键帧 + 源文件
- 视频 / 动画素材 + 工程文件
- 成片

## 六、可复用经验

- 哪些镜头写法可复用
- 哪些模型组合最稳定
- 哪些问题必须前置解决</script>

  <script>
    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/[`]/g, "")
        .replace(/[^\u4e00-\u9fa5a-z0-9\s-]/g, "")
        .trim()
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-") || "section";
    }

    function formatInline(text) {
      let html = escapeHtml(text);
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      return html;
    }

    function parseTable(lines, start) {
      const tableLines = [];
      let i = start;
      while (i < lines.length && /^\|.*\|$/.test(lines[i].trim())) {
        tableLines.push(lines[i].trim());
        i++;
      }
      if (tableLines.length < 2) {
        return null;
      }
      const header = tableLines[0].split("|").slice(1, -1).map(cell => cell.trim());
      const separator = tableLines[1].split("|").slice(1, -1).every(cell => /^:?-+:?$/.test(cell.trim()));
      if (!separator) {
        return null;
      }
      const rows = tableLines.slice(2).map(line => line.split("|").slice(1, -1).map(cell => cell.trim()));
      let html = "<table><thead><tr>";
      header.forEach(cell => {
        html += `<th>${formatInline(cell)}</th>`;
      });
      html += "</tr></thead><tbody>";
      rows.forEach(row => {
        html += "<tr>";
        row.forEach(cell => {
          html += `<td>${formatInline(cell)}</td>`;
        });
        html += "</tr>";
      });
      html += "</tbody></table>";
      return { html, nextIndex: i };
    }

    function parseMarkdown(md) {
      const lines = md.replace(/\r\n/g, "\n").split("\n");
      const toc = [];
      const usedIds = new Map();
      let html = "";
      let i = 0;

      function uniqueId(base) {
        const count = usedIds.get(base) || 0;
        usedIds.set(base, count + 1);
        return count === 0 ? base : `${base}-${count + 1}`;
      }

      while (i < lines.length) {
        const line = lines[i];
        const trimmed = line.trim();

        if (!trimmed) {
          i++;
          continue;
        }

        if (/^```/.test(trimmed)) {
          const lang = trimmed.slice(3).trim();
          const codeLines = [];
          i++;
          while (i < lines.length && !/^```/.test(lines[i].trim())) {
            codeLines.push(lines[i]);
            i++;
          }
          i++;
          html += `<pre><code class="language-${escapeHtml(lang)}">${escapeHtml(codeLines.join("\n"))}</code></pre>`;
          continue;
        }

        if (/^---+$/.test(trimmed)) {
          html += "<hr />";
          i++;
          continue;
        }

        const headingMatch = /^(#{1,4})\s+(.*)$/.exec(trimmed);
        if (headingMatch) {
          const level = headingMatch[1].length;
          const text = headingMatch[2].trim();
          const id = uniqueId(slugify(text));
          html += `<h${level} id="${id}">${formatInline(text)}</h${level}>`;
          if (level >= 2 && level <= 4) {
            toc.push({ level, text, id });
          }
          i++;
          continue;
        }

        const tableResult = parseTable(lines, i);
        if (tableResult) {
          html += tableResult.html;
          i = tableResult.nextIndex;
          continue;
        }

        if (/^- /.test(trimmed)) {
          const items = [];
          while (i < lines.length && /^- /.test(lines[i].trim())) {
            items.push(lines[i].trim().slice(2));
            i++;
          }
          html += "<ul>";
          items.forEach(item => {
            html += `<li>${formatInline(item)}</li>`;
          });
          html += "</ul>";
          continue;
        }

        const paragraphLines = [trimmed];
        i++;
        while (i < lines.length) {
          const next = lines[i].trim();
          if (!next || /^#{1,4}\s+/.test(next) || /^```/.test(next) || /^\|.*\|$/.test(next) || /^- /.test(next) || /^---+$/.test(next)) {
            break;
          }
          paragraphLines.push(next);
          i++;
        }

        const paragraph = paragraphLines.join(" ");
        if (/^用于/.test(paragraph)) {
          html += `<div class="section-note">${formatInline(paragraph)}</div>`;
        } else {
          html += `<p>${formatInline(paragraph)}</p>`;
        }
      }

      return { html, toc };
    }

    const FEEDBACK_FORM_URL = "https://my.feishu.cn/share/base/form/shrcnuWLvLOvcblxKFFQavmgDE4";
    const FEEDBACK_FALLBACK_URL = FEEDBACK_FORM_URL;

    const md = document.getElementById("md-source").textContent.trim();
    const { html, toc } = parseMarkdown(md);

    const content = document.getElementById("content");
    content.innerHTML = html;

    const topLevelSections = [...content.querySelectorAll("h2")];
    topLevelSections.forEach((heading, index) => {
      const section = document.createElement("section");
      section.className = `section-card section-${(index % 4) + 1}`;
      heading.parentNode.insertBefore(section, heading);
      section.appendChild(heading);

      let next = section.nextSibling;
      while (next && !(next.nodeType === 1 && next.tagName === "H2")) {
        const current = next;
        next = next.nextSibling;
        section.appendChild(current);
      }
    });

    const tocList = document.getElementById("toc-list");
    toc.forEach(item => {
      const a = document.createElement("a");
      a.href = `#${item.id}`;
      a.textContent = item.text;
      a.className = `level-${item.level}`;
      tocList.appendChild(a);
    });

    const tocLinks = [...document.querySelectorAll(".toc a")];
    const headings = toc
      .map(item => document.getElementById(item.id))
      .filter(Boolean);

    const observer = new IntersectionObserver(
      entries => {
        const visible = entries
          .filter(entry => entry.isIntersecting)
          .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top)[0];

        if (!visible) {
          return;
        }

        tocLinks.forEach(link => {
          link.classList.toggle("active", link.getAttribute("href") === `#${visible.target.id}`);
        });
      },
      {
        rootMargin: "-20% 0px -70% 0px",
        threshold: 0
      }
    );

    headings.forEach(heading => observer.observe(heading));

    const feedbackOverlay = document.getElementById("feedback-overlay");
    const feedbackOpenButton = document.querySelector("[data-feedback-open]");
    const feedbackCloseButton = document.querySelector("[data-feedback-close]");
    const feedbackFrame = document.getElementById("feedback-frame");
    const feedbackEmpty = document.getElementById("feedback-empty");
    const feedbackLink = document.getElementById("feedback-link");

    function hasFeedbackUrl(url) {
      return Boolean(url && /^https?:\/\//.test(url));
    }

    function openFeedback() {
      feedbackOverlay.hidden = false;
      requestAnimationFrame(() => {
        feedbackOverlay.classList.add("is-open");
        document.body.classList.add("feedback-open");
      });
    }

    function closeFeedback() {
      feedbackOverlay.classList.remove("is-open");
      document.body.classList.remove("feedback-open");
      window.setTimeout(() => {
        if (!feedbackOverlay.classList.contains("is-open")) {
          feedbackOverlay.hidden = true;
        }
      }, 220);
    }

    if (hasFeedbackUrl(FEEDBACK_FORM_URL)) {
      feedbackFrame.src = FEEDBACK_FORM_URL;
      feedbackFrame.hidden = false;
      feedbackEmpty.hidden = true;
    } else {
      feedbackFrame.hidden = true;
      feedbackEmpty.hidden = false;
    }

    const feedbackOpenUrl = FEEDBACK_FALLBACK_URL || FEEDBACK_FORM_URL;
    if (hasFeedbackUrl(feedbackOpenUrl)) {
      feedbackLink.href = feedbackOpenUrl;
      feedbackLink.classList.remove("is-hidden");
    }

    feedbackOpenButton.addEventListener("click", openFeedback);
    feedbackCloseButton.addEventListener("click", closeFeedback);
    feedbackOverlay.addEventListener("click", event => {
      if (event.target === feedbackOverlay) {
        closeFeedback();
      }
    });

    window.addEventListener("keydown", event => {
      if (event.key === "Escape" && feedbackOverlay.classList.contains("is-open")) {
        closeFeedback();
      }
    });
  </script>
</body>
</html>
