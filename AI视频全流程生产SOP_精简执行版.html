  <script id="md-source" type="text/plain"># AI视频全流程生产SOP（精简执行版）

## 一、项目概览

用于快速了解适用对象、交付范围、目录结构和整体流程。

### 1. 适用范围
- 适用对象：`AI视频制作者`
- 视频类型：`剧情短片`、`IP动画`
- 常见时长：`1分30秒-2分钟`
- 项目模式：`1导演 + 1制作` 或 `单人全流程制作`
- 核心平台：`Lib TV`
- 后期工具：`剪映 / PR / AE`

### 2. 目标与交付

#### 流程起点与终点
- 起点：`分镜脚本`
- 终点：`成片交付`

#### 核心交付物
- `分镜脚本`
- `原画关键帧`
- `原画工程文件`
- `动画工程文件`
- `成片`

#### 标准目录结构
```text
01分镜脚本
02原画
03动画
04成片
05工程文件（原画、动画）
```

### 3. 标准流程

```text
脚本分镜 -> 审核 -> 生图 -> 审核 -> 生视频 -> 配音/音画同出 -> 剪辑 -> 导出 -> 审核
```

审核节点：
- `自审`
- `导演审`
- `教研审`

## 二、生产执行

用于实际开工时逐阶段查看执行要求、审核重点和风险提示。

### 1. 分镜脚本

#### 分镜模版
- `镜号`
- `时长`
- `景别`
- `角色`
- `场景`
- `画面描述`
- `情绪`
- `光影氛围`
- `对白`
- `分镜提示词`
- `视频运动提示词`

#### 执行要求
- 每个镜头只承载一个清晰核心动作
- 前后镜头提前考虑衔接
- 关键转场、关键动作、关键表演镜头单独标记
- 高风险真人镜头提前评估

#### 审核重点
- 叙事是否成立
- 镜头逻辑是否清晰
- 镜头衔接是否自然
- 是否适合 AI 生成
- 是否提前考虑角色一致性与场景统一性

---

### 2. 生图

#### 生图提示词基础结构
```text
主体 + 场景 + 风格 + 构图 + 光影 + 细节 + 负面词（可选）
```

#### 执行要求
- 先做角色设定图，再扩镜头图
- 先做场景设定图，再批量生成
- 同一角色、同一场景尽量复用稳定设定
- 生图时优先检查主体、场景光影、风格约束、无效修饰词，以及是否重复描述设定图已有信息
- 执行口径：先做设定，再扩镜头；先保主体，再保风格；先保一致性，再追求复杂效果

#### 角色一致性方法
- 角色设定图
- 场景设定图
- `nanobanana` 进行关键帧合成、编辑
- `PS` 进行细节处理，作为最后调整手段

#### 审核重点
- 角色一致性
- 场景是否统一
- 构图是否支撑后续生视频
- 光影氛围是否准确
- 提示词是否存在明显信息堆砌
- 是否主体不清
- 是否重复描述设定图已有内容
- 是否存在明显融化、畸变、穿帮、结构错误

---

### 3. 生视频

#### 执行要求
- 严格按分镜逐镜生成，不盲目抽卡
- 先做重点镜头测试，再推进批量生产
- 先判断这一镜的核心目标是动作、表演还是运镜，再决定提示词写法
- 先确定五维中的主维度，再补充必要信息
- 能用纯镜头命令解决的，不额外堆砌描述
- 口型镜头、真人镜头、连续动作镜头单独重点验证
- 图生视频前必须确认输入图清晰稳定；若不满足要求，则退回生图阶段处理

#### 审核重点
- 动作是否自然
- 角色是否稳定
- 镜头运动是否符合预期
- 前后镜头是否可拼接
- 画质是否达标
- 口型是否可用
- 是否存在模板套用痕迹过重
- 是否可以改成更短、更稳定的镜头命令
- 是否存在明显 AI 感

#### 已知风险
- `seedance 2.0` 排队时间长，需提前安排产能
- `可灵 o3` 支持真人，但口型仍有偏差
- `seedance 2.0` 中真人角色有绕过审核的方法，但会牺牲画质
- 镜头衔接问题优先在分镜阶段解决，后期可通过 `seedance 2.0` 延长视频、轨道补全等方式补救

---

### 4. 配音 / 音画同出

#### 执行要求
- 配音内容与分镜脚本一致
- 台词长度匹配镜头时长
- 角色声线前后一致
- 口型镜头优先校对发音节奏
- 当前大部分模型支持音画同出，可优先评估是否直接生成
- 需要稳定角色声线时，可直接提供音色参考
- 音画同出时，不建议直接生成配乐
- 音效可根据画面内容同期生成
- 配乐建议后期通过素材库匹配，或用 `Suno`、`剪映` 单独生成后适配
- 若音画同出不稳定，再回退到单独配音或后期补配

#### 审核重点
- 情绪是否准确
- 吐字是否清晰
- 节奏是否匹配画面
- 是否存在明显音画不一致

---

### 5. 剪辑

#### 执行要求
- 按分镜顺序完成镜头拼接
- 修正节奏问题和镜头衔接问题
- 补齐字幕、BGM、音效
- 对必要镜头做补帧、裁切、转场、局部修饰
- 保留工程文件，确保返修可追溯

#### 审核重点
- 节奏是否顺畅
- 镜头切换是否自然
- 字幕是否完整准确
- BGM 和音效是否服务内容
- 成片是否达到可交付标准

---

### 6. 导出与归档

#### 导出前确认
- 分镜脚本为最终版
- 原画素材齐全
- 动画素材命名清晰
- 成片输出版本正确
- 工程文件可打开、可复用
- 配音、BGM、字幕均在工程文件中完整归档

## 三、方法与审核

用于统一生成思路、审核口径和团队判断标准。

### 1. 提示词五维坐标系

用于写提示词、做图、做视频时快速判断“该把注意力放在哪里”。

#### 五维内容
- `绝对主体与物理动势`：主体是谁，做什么，动作是否成立
- `环境场与情绪光影`：场景、情绪、光线、氛围
- `时间轴与状态演变`：前状态、变化过程、后状态
- `光学与摄影机调度`：机位、景别、运镜
- `美学介质与底层约束`：风格、参考图、模型能力边界

### 2. 执行原则

#### 原则一：做减法
- 先写最重要的 1-3 个核心点
- 次要信息能删就删
- 与参考图重复的信息能删就删
- 画面失控时先删词，不先加词

#### 原则二：别乱套模板
- 模板只保留结构，不照搬内容
- 不同镜头目标不用同一长模板硬套
- 先问“这一镜到底要解决什么”，再决定写什么

#### 原则三：纯镜头命令也能出高级感
- 基础画面已成立时，可直接用镜头命令驱动
- 镜头命令尽量单一清晰
- 高级感更多来自调度清晰，而不是提示词华丽

#### 原则四：图生视频先保图片清晰度
- 输入图不清晰，不直接生视频
- 主体轮廓、五官、手部、服装关键结构必须清楚
- 图不清晰先修图，图不稳定先重生图

### 3. 审核机制

#### 自审
制作人按以下维度全项检查：
- 角色一致性
- 镜头衔接
- 画面质量
- 叙事清晰度
- AI 感
- 素材完整性

#### 导演审
重点判断：
- 叙事是否成立
- 表演是否可信
- 镜头语言是否有效
- 情绪和节奏是否准确
- 成片完成度是否达标

#### 教研审
重点判断：
- 内容表达是否准确
- 项目方向是否符合目标
- 是否满足对外传播或教学要求
- 是否具备最终交付条件

### 4. 核心审核标准

#### 角色一致性
- 脸型是否稳定
- 发型是否稳定
- 服装是否稳定
- 配色是否稳定
- 年龄感和身份感是否稳定

#### 镜头衔接
- 前后镜头动作是否能接上
- 视线方向是否连贯
- 构图关系是否合理
- 情绪是否连续
- 转场是否自然

#### 画面质量
- 主体是否清晰
- 细节是否完整
- 是否存在融化、变形、结构错误
- 光影是否自然
- 整体质感是否统一

#### 叙事清晰度
- 镜头是否推动情节
- 信息是否易理解
- 节奏是否拖沓
- 关键情节是否明确
- 观众是否能顺畅看懂

#### 无AI感
- 人物动作是否自然
- 表情是否可信
- 镜头是否像“拍出来”而不是“拼出来”
- 画面是否避免明显模型痕迹
- 整体观感是否真实、顺滑、统一

```</script>

  <script>
    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/[`]/g, "")
        .replace(/[^\u4e00-\u9fa5a-z0-9\s-]/g, "")
        .trim()
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-") || "section";
    }

    function formatInline(text) {
      let html = escapeHtml(text);
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      return html;
    }

    function parseTable(lines, start) {
      const tableLines = [];
      let i = start;
      while (i < lines.length && /^\|.*\|$/.test(lines[i].trim())) {
        tableLines.push(lines[i].trim());
        i++;
      }
      if (tableLines.length < 2) {
        return null;
      }
      const header = tableLines[0].split("|").slice(1, -1).map(cell => cell.trim());
      const separator = tableLines[1].split("|").slice(1, -1).every(cell => /^:?-+:?$/.test(cell.trim()));
      if (!separator) {
        return null;
      }
      const rows = tableLines.slice(2).map(line => line.split("|").slice(1, -1).map(cell => cell.trim()));
      let html = "<table><thead><tr>";
      header.forEach(cell => {
        html += `<th>${formatInline(cell)}</th>`;
      });
      html += "</tr></thead><tbody>";
      rows.forEach(row => {
        html += "<tr>";
        row.forEach(cell => {
          html += `<td>${formatInline(cell)}</td>`;
        });
        html += "</tr>";
      });
      html += "</tbody></table>";
      return { html, nextIndex: i };
    }

    function parseMarkdown(md) {
      const lines = md.replace(/\r\n/g, "\n").split("\n");
      const toc = [];
      const usedIds = new Map();
      let html = "";
      let i = 0;

      function uniqueId(base) {
        const count = usedIds.get(base) || 0;
        usedIds.set(base, count + 1);
        return count === 0 ? base : `${base}-${count + 1}`;
      }

      while (i < lines.length) {
        const line = lines[i];
        const trimmed = line.trim();

        if (!trimmed) {
          i++;
          continue;
        }

        if (/^```/.test(trimmed)) {
          const lang = trimmed.slice(3).trim();
          const codeLines = [];
          i++;
          while (i < lines.length && !/^```/.test(lines[i].trim())) {
            codeLines.push(lines[i]);
            i++;
          }
          i++;
          html += `<pre><code class="language-${escapeHtml(lang)}">${escapeHtml(codeLines.join("\n"))}</code></pre>`;
          continue;
        }

        if (/^---+$/.test(trimmed)) {
          html += "<hr />";
          i++;
          continue;
        }

        const headingMatch = /^(#{1,4})\s+(.*)$/.exec(trimmed);
        if (headingMatch) {
          const level = headingMatch[1].length;
          const text = headingMatch[2].trim();
          const id = uniqueId(slugify(text));
          html += `<h${level} id="${id}">${formatInline(text)}</h${level}>`;
          if (level >= 2 && level <= 4) {
            toc.push({ level, text, id });
          }
          i++;
          continue;
        }

        const tableResult = parseTable(lines, i);
        if (tableResult) {
          html += tableResult.html;
          i = tableResult.nextIndex;
          continue;
        }

        if (/^- /.test(trimmed)) {
          const items = [];
          while (i < lines.length && /^- /.test(lines[i].trim())) {
            items.push(lines[i].trim().slice(2));
            i++;
          }
          html += "<ul>";
          items.forEach(item => {
            html += `<li>${formatInline(item)}</li>`;
          });
          html += "</ul>";
          continue;
        }

        const paragraphLines = [trimmed];
        i++;
        while (i < lines.length) {
          const next = lines[i].trim();
          if (!next || /^#{1,4}\s+/.test(next) || /^```/.test(next) || /^\|.*\|$/.test(next) || /^- /.test(next) || /^---+$/.test(next)) {
            break;
          }
          paragraphLines.push(next);
          i++;
        }

        const paragraph = paragraphLines.join(" ");
        if (/^用于/.test(paragraph)) {
          html += `<div class="section-note">${formatInline(paragraph)}</div>`;
        } else {
          html += `<p>${formatInline(paragraph)}</p>`;
        }
      }

      return { html, toc };
    }

    const md = document.getElementById("md-source").textContent.trim();
    const { html, toc } = parseMarkdown(md);

    const content = document.getElementById("content");
    content.innerHTML = html;

    const topLevelSections = [...content.querySelectorAll("h2")];
    topLevelSections.forEach((heading, index) => {
      const section = document.createElement("section");
      section.className = `section-card section-${(index % 4) + 1}`;
      heading.parentNode.insertBefore(section, heading);
      section.appendChild(heading);

      let next = section.nextSibling;
      while (next && !(next.nodeType === 1 && next.tagName === "H2")) {
        const current = next;
        next = next.nextSibling;
        section.appendChild(current);
      }
    });

    const tocList = document.getElementById("toc-list");
    toc.forEach(item => {
      const a = document.createElement("a");
      a.href = `#${item.id}`;
      a.textContent = item.text;
      a.className = `level-${item.level}`;
      tocList.appendChild(a);
    });

    const tocLinks = [...document.querySelectorAll(".toc a")];
    const headings = toc
      .map(item => document.getElementById(item.id))
      .filter(Boolean);

    const observer = new IntersectionObserver(
      entries => {
        const visible = entries
          .filter(entry => entry.isIntersecting)
          .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top)[0];

        if (!visible) {
          return;
        }

        tocLinks.forEach(link => {
          link.classList.toggle("active", link.getAttribute("href") === `#${visible.target.id}`);
        });
      },
      {
        rootMargin: "-20% 0px -70% 0px",
        threshold: 0
      }
    );

    headings.forEach(heading => observer.observe(heading));
  </script>
</body>
